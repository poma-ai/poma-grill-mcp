name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write
  packages: write
  id-token: write  # for cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go/go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Determine version
        id: version
        run: |
          # Use the latest semver tag reachable from this commit, or fall back to a date-based pre-release.
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            TAG="v0.0.0-$(date +%Y%m%d%H%M%S)-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create or update release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Move the tag to HEAD (creates it if it doesn't exist).
          git tag -fa "$TAG" -m "Release $TAG"
          git push origin "$TAG" --force

      # ── Linux binaries (quick, direct download) ──────────────────────────────
      - name: Build Linux binaries
        working-directory: go
        env:
          TAG: ${{ steps.version.outputs.tag }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/linux
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/linux/poma-grill-mcp-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/linux/poma-grill-mcp-linux-arm64 .

      - name: Upload Linux binaries to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            go/dist/linux/poma-grill-mcp-linux-amd64
            go/dist/linux/poma-grill-mcp-linux-arm64

      # ── GoReleaser (full release: all platforms, checksums, signing, brew) ───
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2"
          args: release --clean
          workdir: go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.POMA_DEPLOY_REPO_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
