name: Release Node

on:
  push:
    branches:
      - release-node

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Read package version
        id: version
        working-directory: node
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ]; then
            echo "could not read version from node/package.json" >&2
            exit 1
          fi
          TAG="node-v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag: $TAG)"

      - name: Check version not already published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@poma-ai/poma-grill-mcp@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::Version ${VERSION} is already on npm. Bump node/package.json and push again."
            exit 1
          fi
          echo "Version ${VERSION} not yet on npm; proceeding."

      - name: Install dependencies
        working-directory: node
        run: npm ci

      - name: Smoke test
        working-directory: node
        run: npm run smoke

      - name: Determine provenance support
        id: provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # npm provenance attestations are published to Sigstore's public
          # transparency log and only work when the source repo is public.
          # Auto-detect so a future visibility change lights up provenance on
          # the next release without a workflow edit.
          VISIBILITY=$(gh repo view --json visibility --jq '.visibility' 2>/dev/null || echo UNKNOWN)
          echo "visibility=$VISIBILITY"
          if [ "$VISIBILITY" = "PUBLIC" ]; then
            echo "flag=--provenance" >> "$GITHUB_OUTPUT"
            echo "Repo is PUBLIC: provenance attestation will be requested."
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "::warning::Repo visibility is ${VISIBILITY}; publishing without --provenance. Make the repo public to enable supply-chain attestation on future releases."
          fi

      - name: Publish to npm
        working-directory: node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public ${{ steps.provenance.outputs.flag }}

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping tag creation."
          else
            git tag -a "${TAG}" -m "Node release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
